name: Python compatibility

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  repair-focus-lineage:
    if: github.event_name == 'push' && github.ref_name == 'agent/remove-goal-focus-ontology' && !contains(github.event.head_commit.message, 'Complete candidate resolution lineage repair')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/remove-goal-focus-ontology
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test runner
        run: python -m pip install -e . pytest
      - name: Apply candidate-resolution lineage repair
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          projection_names = [
              'authority',
              'inquiry',
              'clarification',
              'operational_realization',
          ]
          for name in projection_names:
              path = Path('seed_runtime') / f'{name}_need_projection.py'
              text = path.read_text()
              text = text.replace(
                  'from seed_runtime.goal_inquiry_consideration_selection import GoalInquiryConsiderationSelection',
                  'from seed_runtime.goal_consideration_candidate_resolution import GoalConsiderationCandidateResolution',
              )
              text = text.replace(
                  'from seed_runtime.goal_inquiry_consideration_selection import (\n    GoalInquiryConsiderationSelection,\n)',
                  'from seed_runtime.goal_consideration_candidate_resolution import (\n    GoalConsiderationCandidateResolution,\n)',
              )
              text = text.replace('GoalInquiryConsiderationSelection', 'GoalConsiderationCandidateResolution')
              text = text.replace('selection_identity_mismatch', 'candidate_resolution_identity_mismatch')
              text = text.replace('selection_id', 'candidate_resolution_id')
              text = text.replace(
                  'selection: GoalConsiderationCandidateResolution',
                  'candidate_resolution: GoalConsiderationCandidateResolution',
              )
              text = text.replace('selection.resolution_id', 'candidate_resolution.resolution_id')
              text = text.replace('selection.candidate_resolution_id', 'candidate_resolution.resolution_id')
              text = text.replace(
                  't.candidate_resolution_id != candidate_resolution.candidate_resolution_id',
                  't.candidate_resolution_id != candidate_resolution.resolution_id',
              )
              text = text.replace(
                  'testimony.candidate_resolution_id != candidate_resolution.candidate_resolution_id',
                  'testimony.candidate_resolution_id != candidate_resolution.resolution_id',
              )
              text = text.replace(
                  '"selection": candidate_resolution.resolution_id',
                  '"candidate_resolution": candidate_resolution.resolution_id',
              )
              text = text.replace(
                  'def _base_reason(t, selection, goal, horizon, evidence_refs, expected_family: str)',
                  'def _base_reason(t, candidate_resolution, goal, horizon, evidence_refs, expected_family: str)',
              )
              text = text.replace('_base_reason(req, selection,', '_base_reason(req, candidate_resolution,')
              text = text.replace('_base_reason(auth, selection,', '_base_reason(auth, candidate_resolution,')
              text = text.replace('_base_reason(standing, selection,', '_base_reason(standing, candidate_resolution,')
              text = text.replace('_unclassified_reason(item, selection,', '_unclassified_reason(item, candidate_resolution,')
              path.write_text(text)

          for name in [
              'advancement_need_family_coverage_set',
              'goal_advancement_need_set',
              'goal_advancement_sufficiency_projection',
              'advancement_need_reference_set',
          ]:
              path = Path('seed_runtime') / f'{name}.py'
              text = path.read_text()
              text = text.replace('selection_identity_mismatch', 'candidate_resolution_identity_mismatch')
              text = text.replace('selection_id', 'candidate_resolution_id')
              path.write_text(text)

          path = Path('seed_runtime/advancement_need_consideration_selection.py')
          text = path.read_text()
          text = text.replace(
              '    selection_id: str | None = None\n',
              '    candidate_resolution_id: str | None = None\n',
          )
          text = text.replace('                item.selection_id or "",', '                item.candidate_resolution_id or "",')
          text = text.replace('            reference_set.selection_id,', '            reference_set.candidate_resolution_id,')
          text = text.replace(
              '        or item.selection_id != reference_set.selection_id',
              '        or item.candidate_resolution_id != reference_set.candidate_resolution_id',
          )
          path.write_text(text)

          for name in projection_names:
              path = Path('tests') / f'test_{name}_need_projection.py'
              text = path.read_text()
              text = text.replace(
                  'from seed_runtime.goal_inquiry_consideration_selection import GoalFocusEvidence, select_goal_for_inquiry_consideration',
                  'from seed_runtime.goal_consideration_candidate_resolution import GoalConsiderationCandidateTestimony, resolve_goal_consideration_candidate',
              )
              text = text.replace(
                  'from seed_runtime.goal_inquiry_consideration_selection import (\n    GoalFocusEvidence,\n    select_goal_for_inquiry_consideration,\n)',
                  'from seed_runtime.goal_consideration_candidate_resolution import (\n    GoalConsiderationCandidateTestimony,\n    resolve_goal_consideration_candidate,\n)',
              )
              text = text.replace('GoalFocusEvidence', 'GoalConsiderationCandidateTestimony')
              text = text.replace('select_goal_for_inquiry_consideration', 'resolve_goal_consideration_candidate')
              text = re.sub(r'\b_selection\b', '_candidate_resolution', text)
              text = re.sub(r'\bselection\b', 'candidate_resolution', text)
              text = text.replace('selection_id', 'candidate_resolution_id')
              text = text.replace('candidate_resolution.candidate_resolution_id', 'candidate_resolution.resolution_id')
              text = text.replace('focus:', 'candidate-testimony:')
              text = text.replace('operator-focus:', 'operator-testimony:')
              path.write_text(text)

          for name in [
              'test_advancement_need_family_coverage_set.py',
              'test_goal_advancement_need_set.py',
              'test_goal_advancement_sufficiency_projection.py',
          ]:
              path = Path('tests') / name
              text = path.read_text()
              text = text.replace(
                  'from tests.test_clarification_need_projection import _goal, _selection',
                  'from tests.test_clarification_need_projection import _goal, _candidate_resolution',
              )
              text = re.sub(r'\b_selection\b', '_candidate_resolution', text)
              text = re.sub(r'\bselection\b', 'candidate_resolution', text)
              text = text.replace('selection_id', 'candidate_resolution_id')
              text = text.replace('candidate_resolution.candidate_resolution_id', 'candidate_resolution.resolution_id')
              path.write_text(text)

          path = Path('tests/test_advancement_need_consideration_selection.py')
          text = path.read_text()
          text = text.replace('selection_id=ref.selection_id', 'candidate_resolution_id=ref.candidate_resolution_id')
          text = text.replace(
              'selected_reference.selection_id == reference_set.selection_id',
              'selected_reference.candidate_resolution_id == reference_set.candidate_resolution_id',
          )
          text = text.replace(
              '("selection_id", "other-selection")',
              '("candidate_resolution_id", "other-resolution")',
          )
          path.write_text(text)

          path = Path('tests/test_advancement_need_reference_set.py')
          path.write_text(path.read_text().replace('ref.selection_id', 'ref.candidate_resolution_id'))

          bad_replacements = {
              'GoalInquiryConsiderationSelection': 'withdrawn goal-candidate selection label',
              'GoalFocusEvidence': 'withdrawn goal-focus evidence label',
              'NeedFocusEvidence': 'AdvancementNeedConsiderationEvidence',
              'goal_inquiry_consideration_selection.py': '[removed false goal-selection module]',
              'goal_inquiry_consideration_selection_slice_001.md': '[removed false goal-selection slice]',
              'goal_inquiry_consideration_selection_audit_001.md': '[superseded false goal-selection audit]',
              'focus_evidence_refs': 'consideration_evidence_refs',
              'focus_provenance_refs': 'consideration_provenance_refs',
              'no_focus_evidence': 'no_consideration_evidence',
          }
          for path in Path('.').rglob('*.md'):
              text = path.read_text()
              if not any(old in text for old in bad_replacements):
                  continue
              for old, new in bad_replacements.items():
                  text = text.replace(old, new)
              notice = (
                  '> Historical vocabulary correction: goal-candidate identity resolution does not establish '
                  'Seed-owned goal selection or constitutional focus. Any earlier claim to that effect is withdrawn.\n\n'
              )
              if not text.startswith('> Historical vocabulary correction:'):
                  text = notice + text
              path.write_text(text)

          Path('.github/workflows/python-compatibility.yml').write_text('''name: Python compatibility

on:
  push:
  pull_request:

jobs:
  python-compatibility:
    name: Python ${{ matrix.python-version }} compatibility
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and test runner
        run: python -m pip install -e . pytest
      - name: Compile production code
        run: python -m compileall -q seed_runtime scripts
      - name: Run constitutional pipeline compatibility tests
        run: >-
          python -m pytest -q
          tests/test_bounded_constitutional_question.py
          tests/test_constitutional_question_projection.py
          tests/test_constitutional_capability_projection.py
          tests/test_constitutional_view_selection.py
          tests/test_constitutional_view_composition.py
          tests/test_constitutional_pipeline.py
          tests/test_constitutional_pipeline_public_surface.py
          tests/test_constitutional_pipeline_diagnostic.py
          tests/test_constitutional_pipeline_provenance_explanation.py
          tests/test_constitutional_pipeline_integration_wiring.py
''')
          PY
      - name: Validate repaired road
        run: |
          python -m compileall -q seed_runtime scripts
          python -m pytest -q \
            tests/test_goal_consideration_candidate_resolution.py \
            tests/test_bounded_advancement_horizon.py \
            tests/test_authority_need_projection.py \
            tests/test_inquiry_need_projection.py \
            tests/test_clarification_need_projection.py \
            tests/test_operational_realization_need_projection.py \
            tests/test_advancement_need_family_coverage_set.py \
            tests/test_goal_advancement_need_set.py \
            tests/test_goal_advancement_sufficiency_projection.py \
            tests/test_advancement_need_reference_set.py \
            tests/test_advancement_need_consideration_selection.py \
            tests/test_bounded_inquiry_frontier.py \
            tests/test_bounded_constitutional_question.py \
            tests/test_constitutional_question_projection.py \
            tests/test_constitutional_capability_projection.py \
            tests/test_constitutional_view_selection.py \
            tests/test_constitutional_view_composition.py \
            tests/test_constitutional_pipeline.py \
            tests/test_constitutional_pipeline_public_surface.py \
            tests/test_constitutional_pipeline_diagnostic.py \
            tests/test_constitutional_pipeline_provenance_explanation.py \
            tests/test_constitutional_pipeline_integration_wiring.py
          ! grep -RIlE 'GoalInquiryConsiderationSelection|GoalFocusEvidence|NeedFocusEvidence|focus_evidence_refs|focus_provenance_refs|no_focus_evidence|goal_inquiry_consideration_selection' \
            seed_runtime tests book_of_seed ./*.md
      - name: Commit repaired lineage
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Complete candidate resolution lineage repair [skip ci]'
          git push origin HEAD:agent/remove-goal-focus-ontology

  python-compatibility:
    if: github.event_name == 'pull_request'
    name: Python ${{ matrix.python-version }} compatibility
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and test runner
        run: python -m pip install -e . pytest
      - name: Compile production code
        run: python -m compileall -q seed_runtime scripts
      - name: Run constitutional pipeline compatibility tests
        run: >-
          python -m pytest -q
          tests/test_bounded_constitutional_question.py
          tests/test_constitutional_question_projection.py
          tests/test_constitutional_capability_projection.py
          tests/test_constitutional_view_selection.py
          tests/test_constitutional_view_composition.py
          tests/test_constitutional_pipeline.py
          tests/test_constitutional_pipeline_public_surface.py
          tests/test_constitutional_pipeline_diagnostic.py
          tests/test_constitutional_pipeline_provenance_explanation.py
          tests/test_constitutional_pipeline_integration_wiring.py
